<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uni-English AI Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=4" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1 class="site-title">Uni-English AI Coach</h1>
            <p class="site-tagline">Academic English · Summary · Terms · Quiz</p>
          </div>
        </div>
      </div>
    </header>

    <main class="container main-content">
      <p class="lead">
        Paste an academic English text below. You’ll get a clear summary, key terms, and a short quiz to
        check understanding.
      </p>

      <section class="panel panel--input" aria-labelledby="input-heading">
        <h2 id="input-heading" class="panel__title">Analyze your text</h2>
        <label class="field-label" for="inputText">Academic text</label>
        <textarea
          id="inputText"
          class="input-textarea"
          placeholder="Paste your academic English text here (at least 80 characters)..."
          rows="10"
        ></textarea>

        <div class="input-actions">
          <button type="button" id="analyzeBtn" class="btn btn--primary" disabled>
            <span class="btn__label">Analyze</span>
          </button>
          <div id="loadingState" class="loading-state hidden" role="status" aria-live="polite">
            <span class="spinner" aria-hidden="true"></span>
            <span class="loading-state__text">Analyzing...</span>
          </div>
        </div>
        <p id="statusText" class="status"></p>
      </section>

      <section id="results" class="results-grid hidden" aria-live="polite">
        <article class="result-card">
          <h2 class="result-card__title">Summary</h2>
          <ul id="summaryList" class="result-list"></ul>
        </article>

        <article class="result-card">
          <h2 class="result-card__title">Technical terms</h2>
          <ul id="termsList" class="result-list result-list--terms"></ul>
        </article>

        <article class="result-card result-card--quiz">
          <h2 class="result-card__title">Mini quiz</h2>
          <div id="quizList" class="quiz-list"></div>
        </article>
      </section>
    </main>

    <script src="./app.js?v=2"></script>
  </body>
</html>
